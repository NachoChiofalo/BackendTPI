  api-gateway:
    build:
      context: ../../
      dockerfile: api-gateway/Dockerfile
    container_name: tpi-api-gateway
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8090
      - KEYCLOAK_AUTH_SERVER_URL=http://tpi-keycloak:8080
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tpi-network

volumes:
  postgres_data:

networks:
  tpi-network:
    driver: bridge

