    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tpi-network

  ms-precios:
    build:
      context: ../../
      dockerfile: ms-precios/Dockerfile
    container_name: tpi-ms-precios
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://tpi-postgres:5432/tpi_logistica
      - SPRING_DATASOURCE_USERNAME=tpi_user
      - SPRING_DATASOURCE_PASSWORD=tpi_pass
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tpi-network

  ms-rutas:
    build:
      context: ../../
      dockerfile: ms-rutas/Dockerfile
    container_name: tpi-ms-rutas
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://tpi-postgres:5432/tpi_logistica
      - SPRING_DATASOURCE_USERNAME=tpi_user
      - SPRING_DATASOURCE_PASSWORD=tpi_pass
      - OSRM_URL=http://tpi-osrm:5000
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
#      osrm:
#        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
