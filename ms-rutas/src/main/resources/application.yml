server:
  port: 8085
  tomcat:
    connection-timeout: 120s
    keep-alive-timeout: 120s
    max-keep-alive-requests: 100

spring:
  application:
    name: ms-rutas

  security:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tpi_logistica}
    username: ${SPRING_DATASOURCE_USERNAME:tpi_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tpi_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: false

# Configuración de microservicios
solicitudes:
  service:
    url: ${SOLICITUDES_SERVICE_URL:http://ms-solicitudes:8084}

flotas:
  service:
    url: ${FLOTAS_SERVICE_URL:http://ms-flotas:8081}

localizaciones:
  service:
    url: ${MS_LOCALIZACIONES_URL:http://tpi-ms-localizaciones:8087}

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 60000

# Configuración de RestTemplate timeouts
http:
  client:
    connection-timeout: 10000
    read-timeout: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

logging:
  level:
    com.tpi.rutas: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Configuración de Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tryItOutEnabled: true
    operationsSorter: method
    tagsSorter: alpha
    config-url: /api-docs/swagger-config
    url: /api-docs
  show-actuator: true
  group-configs:
    - group: 'rutas-api'
      paths-to-match: '/api/rutas/**'
      packages-to-scan: 'com.tpi.rutas.controller'

