spring:
  application:
    name: ms-localizaciones

  # Configuración de base de datos
  datasource:
    url: jdbc:postgresql://localhost:5432/tpi_logistica
    username: tpi_user
    password: tpi_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      data-source-properties:
        stringtype: unspecified

  # Configuración JPA
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # Deshabilitar Flyway (BD manejada por Docker Compose)
  flyway:
    enabled: false

  # Configuración de servidor
server:
  port: 8087
  servlet:
    context-path: /
    
# Actuator para health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.tpi.localizaciones: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Configuración OSRM
osrm:
  base-url: http://localhost:5000
  profile: driving
  connection-timeout: 5000
  read-timeout: 10000
  enabled: false  # Temporalmente deshabilitado hasta configurar los datos de Argentina
  max-retries: 3
