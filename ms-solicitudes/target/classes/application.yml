spring:
  application:
    name: ms-solicitudes

  # Deshabilitar seguridad temporalmente para pruebas
  security:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tpi_logistica?TimeZone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:tpi_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tpi_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: false

server:
  port: 8084
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tpi.solicitudes: DEBUG
    org.hibernate.SQL: DEBUG

# Configuración de microservicios
rutas:
  service:
    url: ${RUTAS_SERVICE_URL:http://ms-rutas:8085}
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Configuración de Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tryItOutEnabled: true
    operationsSorter: method
    tagsSorter: alpha
    config-url: /api-docs/swagger-config
    url: /api-docs
  show-actuator: true
  group-configs:
    - group: 'solicitudes-api'
      paths-to-match: '/api/solicitudes/**'
      packages-to-scan: 'com.tpi.solicitudes.controller'
