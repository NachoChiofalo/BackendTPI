server:
  port: 8081

spring:
  application:
    name: ms-flotas


  # Deshabilitar seguridad temporalmente para pruebas
  security:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

  # Configuración de zona horaria
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd HH:mm:ss

  # Configuración JPA con timezone específico
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tpi_logistica}
    username: ${SPRING_DATASOURCE_USERNAME:tpi_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tpi_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Deshabilitar Flyway ya que usamos base de datos preexistente
  flyway:
    enabled: false

# Eureka Client (Service Discovery)
eureka:
  client:
    enabled: false # Deshabilitado para desarrollo local
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# OpenFeign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

# Logging
logging:
  level:
    com.tpi.flotas: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Configuración de Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tryItOutEnabled: true
    operationsSorter: method
    tagsSorter: alpha
    config-url: /api-docs/swagger-config
    url: /api-docs
  show-actuator: true
  group-configs:
    - group: 'flotas-api'
      paths-to-match: '/api/flotas/**'
      packages-to-scan: 'com.tpi.flotas.controller'

